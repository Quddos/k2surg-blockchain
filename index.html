<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K2Surg VR Blockchain Status</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 2rem;
        background: #111827;
        color: #e5e7eb;
      }
      .card {
        background: #1f2937;
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        max-width: 700px;
        margin: auto;
      }
      button {
        padding: 0.85rem 1.25rem;
        margin-right: 1rem;
        margin-top: 1rem;
        border: none;
        border-radius: 999px;
        background: #6366f1;
        color: white;
        cursor: pointer;
        font-size: 1rem;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      pre {
        background: #111827;
        padding: 1rem;
        border-radius: 12px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>K2Surg VR Blockchain Status</h1>
      <p>Use this page to verify your Vercel deployment and test the API connection from Unity.</p>
      <div>
        <button id="healthBtn">Check API Health</button>
        <button id="statusBtn">Check Contract Status</button>
        <button id="mintBtn">Send Sample Performance</button>
      </div>
      <div id="output" style="margin-top:1.5rem"></div>
    </div>

    <script>
      const output = document.getElementById("output");
      const apiBase = window.location.origin;

      function renderResult(title, data) {
        output.innerHTML = `<h2>${title}</h2><pre>${JSON.stringify(data, null, 2)}</pre>`;
      }

      async function checkHealth() {
        renderResult("Checking health...", { status: "pending" });
        const response = await fetch(`${apiBase}/api/health`);
        const data = await response.json();
        renderResult("Health result", data);
      }

      async function checkStatus() {
        renderResult("Checking contract status...", { status: "pending" });
        const response = await fetch(`${apiBase}/api/status`);
        const data = await response.json();
        renderResult("Contract status", data);
      }

      async function sendSample() {
        renderResult("Sending performance sample...", { status: "pending" });
        const response = await fetch(`${apiBase}/api/record`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ score: 260, transfers: 5, penalties: 1 }),
        });
        const data = await response.json();
        renderResult("Performance response", data);
      }

      document.getElementById("healthBtn").onclick = checkHealth;
      document.getElementById("statusBtn").onclick = checkStatus;
      document.getElementById("mintBtn").onclick = sendSample;
    </script>
  </body>
</html>
